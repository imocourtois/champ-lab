name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Contrôle sobre : format, lint, types, tests.
      - name: Format
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type-check
        run: deno check
      - name: Tests
        run: deno test -A

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Vérifie que le build de production passe. Le déploiement lui-même est
      # géré par l'intégration native Deno Deploy (branchée sur le repo GitHub),
      # pas par ce workflow.
      - name: Build with Fresh
        run: deno task build

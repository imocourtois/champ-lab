name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Contrôle sobre : format, lint, types, tests.
      - name: Format
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type-check
        run: deno check
      - name: Tests
        run: deno test -A

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build with Fresh
        run: deno task build
      - name: Deploy to Deno Deploy
        run: |
          deno run -A https://deno.land/x/deploy/deployctl.ts \
            --project=champ-lab \
            --config=deno.json \
            main.ts
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
